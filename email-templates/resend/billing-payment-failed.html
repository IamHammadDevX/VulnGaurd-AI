<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment failed</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f7fb;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;width:100%;background:#ffffff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;">
            <tr>
              <td style="padding:28px 28px 18px 28px;background:#7f1d1d;color:#ffffff;">
                <p style="margin:0;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#fecaca;">Billing Alert</p>
                <h1 style="margin:10px 0 0 0;font-size:26px;line-height:1.2;">Payment failed</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <p style="margin:0 0 14px 0;font-size:16px;line-height:1.6;">Hi {{name}},</p>
                <p style="margin:0 0 12px 0;font-size:15px;line-height:1.7;color:#374151;">We could not process your payment for plan <strong>{{plan}}</strong>.</p>
                <p style="margin:0 0 24px 0;font-size:14px;line-height:1.7;color:#4b5563;">Update your payment method to avoid service interruption.</p>
                <p style="margin:0 0 24px 0;text-align:center;">
                  <a href="{{billing_url}}" style="display:inline-block;background:#7f1d1d;color:#ffffff;text-decoration:none;padding:12px 20px;border-radius:999px;font-weight:700;">Update billing</a>
                </p>
                <p style="margin:0;font-size:13px;line-height:1.7;color:#6b7280;">If you already updated payment details, ignore this email.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 28px;background:#f9fafb;border-top:1px solid #e5e7eb;">
                <p style="margin:0;font-size:12px;line-height:1.7;color:#6b7280;">VulnGuard AI Billing Team<br/>billing@thevulnguardai.tech</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
