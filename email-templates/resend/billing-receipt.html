<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment receipt</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f7fb;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;width:100%;background:#ffffff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;">
            <tr>
              <td style="padding:28px 28px 18px 28px;background:#14532d;color:#ffffff;">
                <p style="margin:0;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#bbf7d0;">Billing</p>
                <h1 style="margin:10px 0 0 0;font-size:26px;line-height:1.2;">Payment receipt</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <p style="margin:0 0 14px 0;font-size:16px;line-height:1.6;">Hi {{name}},</p>
                <p style="margin:0 0 16px 0;font-size:15px;line-height:1.7;color:#374151;">Payment received successfully for your VulnGuard AI subscription.</p>
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;">
                  <tr>
                    <td style="padding:10px 14px;font-size:13px;color:#6b7280;background:#f9fafb;">Plan</td>
                    <td style="padding:10px 14px;font-size:13px;color:#111827;">{{plan}}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 14px;font-size:13px;color:#6b7280;background:#f9fafb;">Amount</td>
                    <td style="padding:10px 14px;font-size:13px;color:#111827;">{{amount}}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 14px;font-size:13px;color:#6b7280;background:#f9fafb;">Invoice ID</td>
                    <td style="padding:10px 14px;font-size:13px;color:#111827;">{{invoice_id}}</td>
                  </tr>
                  <tr>
                    <td style="padding:10px 14px;font-size:13px;color:#6b7280;background:#f9fafb;">Date</td>
                    <td style="padding:10px 14px;font-size:13px;color:#111827;">{{date}}</td>
                  </tr>
                </table>
                <p style="margin:20px 0 0 0;font-size:13px;line-height:1.7;color:#6b7280;">Need invoice copy? Reply to billing@thevulnguardai.tech.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
