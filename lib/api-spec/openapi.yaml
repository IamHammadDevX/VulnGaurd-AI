openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VulnGuard AI - Smart Contract Vulnerability Scanner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scan
    description: Smart contract vulnerability scanning
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scan:
    post:
      operationId: scanContract
      tags: [scan]
      summary: Scan a Solidity smart contract for vulnerabilities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "200":
          description: Scan completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /generate-fix:
    post:
      operationId: generateFix
      tags: [scan]
      summary: Generate an enhanced fix for a specific vulnerability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateFixRequest"
      responses:
        "200":
          description: Fix generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateFixResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /report/{scanId}:
    get:
      operationId: getReport
      tags: [scan]
      summary: Download a PDF audit report for a completed scan
      parameters:
        - name: scanId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF audit report
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Scan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ScanRequest:
      type: object
      properties:
        code:
          type: string
          description: Solidity smart contract source code
        contractName:
          type: ["string", "null"]
          description: Optional contract name
      required:
        - code

    Vulnerability:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          description: Vulnerability category (e.g. Reentrancy, Integer Overflow)
        severity:
          type: string
          enum: [CRITICAL, HIGH, MEDIUM, LOW]
        line_number:
          type: ["integer", "null"]
          description: Primary line number where the vulnerability occurs
        affected_lines:
          type: ["string", "null"]
          description: Range or list of affected lines (e.g. "8-12, 24")
        title:
          type: string
          description: Short descriptive title
        description:
          type: string
          description: Plain English explanation for non-technical users
        technical_risk:
          type: string
          description: Detailed technical explanation of the attack vector
        attack_scenario:
          type: ["string", "null"]
          description: Step-by-step how an attacker would exploit this
        affected_functions:
          type: ["string", "null"]
          description: Comma-separated list of affected function names
        impact:
          type: ["string", "null"]
          description: What an attacker could gain if exploited
        swc_id:
          type: ["string", "null"]
          description: SWC Registry identifier (e.g. SWC-107)
        vulnerable_code:
          type: ["string", "null"]
        fixed_code:
          type: ["string", "null"]
        recommendation:
          type: string
          description: Best practice recommendation to prevent this
      required:
        - id
        - type
        - severity
        - line_number
        - title
        - description
        - technical_risk
        - vulnerable_code
        - fixed_code
        - recommendation

    ScanResult:
      type: object
      properties:
        success:
          type: boolean
        scanId:
          type: string
        contract_name:
          type: string
        total_vulnerabilities:
          type: integer
        risk_score:
          type: integer
        vulnerabilities:
          type: array
          items:
            $ref: "#/components/schemas/Vulnerability"
        summary:
          type: string
        analysis_time_ms:
          type: integer
        timestamp:
          type: string
      required:
        - success
        - scanId
        - contract_name
        - total_vulnerabilities
        - risk_score
        - vulnerabilities
        - summary
        - analysis_time_ms
        - timestamp

    GenerateFixRequest:
      type: object
      properties:
        vulnerability:
          $ref: "#/components/schemas/Vulnerability"
        contractCode:
          type: string
      required:
        - vulnerability
        - contractCode

    GenerateFixResult:
      type: object
      properties:
        success:
          type: boolean
        original_code:
          type: ["string", "null"]
        fixed_code:
          type: string
        explanation:
          type: string
        resources:
          type: array
          items:
            type: string
      required:
        - success
        - original_code
        - fixed_code
        - explanation
        - resources

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
