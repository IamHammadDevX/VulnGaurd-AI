openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: VulnGuard AI - Smart Contract Vulnerability Scanner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scan
    description: Smart contract vulnerability scanning
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scan:
    post:
      operationId: scanContract
      tags: [scan]
      summary: Scan a Solidity smart contract for vulnerabilities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "200":
          description: Scan completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /generate-fix:
    post:
      operationId: generateFix
      tags: [scan]
      summary: Generate an enhanced fix for a specific vulnerability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateFixRequest"
      responses:
        "200":
          description: Fix generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateFixResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /report/{scanId}:
    get:
      operationId: getReport
      tags: [scan]
      summary: Download a PDF audit report for a completed scan
      parameters:
        - name: scanId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF audit report
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Scan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ScanRequest:
      type: object
      properties:
        code:
          type: string
          description: Solidity smart contract source code
        contractName:
          type: ["string", "null"]
          description: Optional contract name
      required:
        - code

    Vulnerability:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          description: Vulnerability category (e.g. Reentrancy, Integer Overflow)
        severity:
          type: string
          enum: [CRITICAL, HIGH, MEDIUM, LOW]
        line_number:
          type: ["integer", "null"]
          description: Primary line number where the vulnerability occurs
        affected_lines:
          type: ["string", "null"]
          description: Range or list of affected lines (e.g. "8-12, 24")
        title:
          type: string
          description: Short descriptive title
        description:
          type: string
          description: Plain English explanation for non-technical users
        technical_risk:
          type: string
          description: Detailed technical explanation of the attack vector
        attack_scenario:
          type: ["string", "null"]
          description: Step-by-step how an attacker would exploit this
        affected_functions:
          type: ["string", "null"]
          description: Comma-separated list of affected function names
        impact:
          type: ["string", "null"]
          description: What an attacker could gain if exploited
        swc_id:
          type: ["string", "null"]
          description: SWC Registry identifier (e.g. SWC-107)
        gas_impact:
          type: ["string", "null"]
          description: Gas cost impact of the vulnerability and its fix
        vulnerable_code:
          type: ["string", "null"]
        fixed_code:
          type: ["string", "null"]
        recommendation:
          type: string
          description: Best practice recommendation to prevent this
      required:
        - id
        - type
        - severity
        - line_number
        - title
        - description
        - technical_risk
        - vulnerable_code
        - fixed_code
        - recommendation

    ScanResult:
      type: object
      properties:
        success:
          type: boolean
        scanId:
          type: string
        contract_name:
          type: string
        total_vulnerabilities:
          type: integer
        risk_score:
          type: integer
        vulnerabilities:
          type: array
          items:
            $ref: "#/components/schemas/Vulnerability"
        summary:
          type: string
        analysis_time_ms:
          type: integer
        timestamp:
          type: string
      required:
        - success
        - scanId
        - contract_name
        - total_vulnerabilities
        - risk_score
        - vulnerabilities
        - summary
        - analysis_time_ms
        - timestamp

    GenerateFixRequest:
      type: object
      properties:
        vulnerability:
          $ref: "#/components/schemas/Vulnerability"
        contractCode:
          type: string
      required:
        - vulnerability
        - contractCode

    GenerateFixResult:
      type: object
      properties:
        success:
          type: boolean
        original_code:
          type: ["string", "null"]
        fixed_code:
          type: string
        explanation:
          type: string
        resources:
          type: array
          items:
            type: string
      required:
        - success
        - original_code
        - fixed_code
        - explanation
        - resources

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
